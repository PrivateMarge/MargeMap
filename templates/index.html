<!DOCTYPE html>
<html>
<head>
    <title>Ma Carte Vélo Hors Ligne</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        /* On retire les marges de la page pour que la carte prenne tout l'écran */
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; } 
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // On initialise la carte dans la boîte #map
        // [45.9000, 6.1167] sont les coordonnées d'Annecy, et 13 est le niveau de zoom de départ
        var map = L.map('map').setView([45.9000, 6.1167], 13); 

        // ATTENTION ICI : On dit à Leaflet de ne pas aller sur internet, 
        // mais de demander les tuiles à notre serveur Flask sur la route '/tiles/...'
        L.tileLayer('/tiles/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '© Ma propre carte hors ligne !'
        }).addTo(map);
    </script>
</body>
</html>
